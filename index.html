<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parceiro Car - Delimitação da Propriedade</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

header{
    background:#1d6f42;
    color:white;
    padding:18px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

#map{
    height:82vh;
}

#painel{

    display:flex;
    justify-content:center;
    gap:15px;
    padding:15px;
    background:white;
}

button{

    background:#1d6f42;
    color:white;
    border:none;
    padding:14px 35px;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#155232;
}

</style>

</head>
<body>

<header>

Delimite sua propriedade

</header>

<div id="map"></div>

<div id="painel">

<button onclick="enviar()">Enviar</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>

const map = L.map('map').setView([-22.9068, -43.1729], 13);

// OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

// Grupo dos desenhos
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

// Ferramenta de desenho
const drawControl = new L.Control.Draw({

    edit:{
        featureGroup:drawnItems
    },

    draw:{

        polygon:true,
        rectangle:true,
        circle:false,
        marker:false,
        circlemarker:false,
        polyline:false

    }

});

map.addControl(drawControl);

// Apenas um desenho
map.on(L.Draw.Event.CREATED,function(e){

    drawnItems.clearLayers();

    drawnItems.addLayer(e.layer);

});

function gerarCodigo(){

    const caracteres="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let codigo="";

    for(let i=0;i<20;i++){

        codigo+=caracteres.charAt(
            Math.floor(Math.random()*caracteres.length)
        );

    }

    return codigo;

}

function enviar(){

    if(drawnItems.getLayers().length==0){

        alert("Desenhe sua propriedade antes de enviar.");

        return;

    }

    const codigo=gerarCodigo();

    const mensagem=
`Olá!

Segue o código da minha delimitação da propriedade.

Código: ${codigo}

Gostaria de continuar meu cadastro do CAR.`;

    // coloque o número desejado
    const telefone="5569992064707";

    const url=`https://wa.me/${telefone}?text=${encodeURIComponent(mensagem)}`;

    window.open(url,"_blank");

}

</script>

</body>
</html>
